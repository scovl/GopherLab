services:
  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 5s
    container_name: gopherlab-runner
    mem_limit: 768m
    cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  terminal:
    build:
      context: ./terminal
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 5s
    container_name: gopherlab-terminal
    mem_limit: 512m
    cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # Run Go tests: docker compose --profile test run --rm runner-test
  runner-test:
    build:
      context: ./runner
      dockerfile: Dockerfile
      target: test-runner
    container_name: gopherlab-runner-test
    mem_limit: 512m
    cpus: '1.0'
    profiles:
      - test

  gopherlab:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    container_name: gopherlab
    depends_on:
      runner:
        condition: service_healthy
      terminal:
        condition: service_healthy
    networks:
      - default
      - backend

  # Dev mode: hot reload — docker compose --profile dev up
  gopherlab-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev

volumes:
  node_modules:

networks:
  backend:
    internal: true
