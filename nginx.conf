server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' ws: wss:; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/terminal/ws {
        set $terminal_backend http://terminal:8082;
        proxy_pass $terminal_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn apiconn 3;
        set $runner_backend http://runner:8081;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $runner_backend;
        proxy_set_header Host $host;
        proxy_set_header X-PoW-Nonce $http_x_pow_nonce;
        proxy_set_header X-PoW-Solution $http_x_pow_solution;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        client_max_body_size 64k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
